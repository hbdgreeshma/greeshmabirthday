<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Greeshma Protocol | Celebration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="cursor-trail"></div>

    <div id="intro-overlay">
        <div class="glass-vault" id="gift-box">
            <div class="ribbon-vertical"></div>
            <div class="ribbon-horizontal"></div>
            <div class="lid"></div>
            <div class="box-body">
                <span class="emoji-glow">🎁</span>
            </div>
            <p class="click-instruction">Open for a Surprise ✨</p>
        </div>
    </div>

    <div id="party-container" class="hidden">
        
        <div class="content-wrapper">
             
             <div class="title-section">
                <h1 class="party-title">Happy Birthday</h1>
                <h2 class="name-highlight">Greeshma <span class="bouncing-emojis">🎂🎈🎉🥳</span></h2>
             </div>
             
             <p class="subtitle" id="instruction-text">Make a wish & blow out the candles!</p>

             <div class="main-stage">
                 
                 <div class="side-panel left-panel">
                     <div class="tilt-card" data-tilt>
                         <div class="photo-frame">
                            <div class="gloss-overlay"></div>
                            <img src="greeshma.jpg" alt="The Star" class="profile-pic">
                         </div>
                     </div>
                 </div>

                 <div class="cake-section">
                     <div class="cake-container">
                         <div class="cake">
                             <div class="icing"></div>
                             <div class="cherry"></div><div class="cherry c2"></div><div class="cherry c3"></div>
                             <div class="candles-container">
                                 <div class="candle" onclick="blowCandle(this)"><div class="flame"></div><div class="wick"></div><div class="wax"></div></div>
                                 <div class="candle" onclick="blowCandle(this)"><div class="flame"></div><div class="wick"></div><div class="wax"></div></div>
                                 <div class="candle" onclick="blowCandle(this)"><div class="flame"></div><div class="wick"></div><div class="wax"></div></div>
                             </div>
                             <div class="cake-layer top-layer"></div>
                             <div class="cake-layer middle-layer"></div>
                             <div class="cake-layer bottom-layer"></div>
                         </div>
                     </div>
                 </div>

                 <div class="side-panel right-panel">
                     <div class="tilt-card" data-tilt>
                         <div class="poem-card">
                             <div class="gloss-overlay"></div>
                             <h3>The Muse</h3>
                             <p>
                                 A spirit rare, a light so bright,<br>
                                 Turning shadows into light.<br>
                                 On this day, the stars align,<br>
                                 To celebrate a soul divine.<br>
                             </p>
                         </div>
                     </div>
                 </div>
             </div>

             <div class="bottom-quote-area">
                 <p>"Elegance is the only beauty that never fades."</p>
                 <div class="signature">- SANDEEP</div>
             </div>
        </div>

        <div id="candy-floor"></div>
    </div>

    <audio id="bday-song" src="song.mp3" preload="auto" loop></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
